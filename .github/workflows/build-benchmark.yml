name: Build benchmark

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build benchmark
        id: build_benchmark
        run: |
          python scripts/download_and_build_benchmark.py --ci-mode

      - name: Output benchmark results
        if: always()
        run: |
          echo "Build benchmark step outcome: ${{ steps.build_benchmark.outcome }}"
          for file in benchmark.csv source_coverage.csv join_diagnostics.csv; do
            echo "===== ${file} ====="
            if [ -f "$file" ]; then
              cat "$file"
            else
              echo "(missing)"
            fi
          done

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: |
            benchmark.csv
            source_coverage.csv
            join_diagnostics.csv
          if-no-files-found: warn
